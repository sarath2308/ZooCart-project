<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toast Alert Options (No Dependencies)</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f0f0f0;
      gap: 20px;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #5995fd;
      color: white;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #4481eb;
    }

    /* Toast Container */
    .toast {
      position: fixed;
      padding: 15px 20px;
      border-radius: 5px;
      color: white;
      font-size: 14px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.5s ease;
      display: flex;
      align-items: center;
      gap: 10px; /* Space between icon and text */
    }

    .toast.show {
      opacity: 1;
    }

    /* Custom Icons using Pseudo-elements */
    .toast::before {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      font-size: 16px;
      text-align: center;
    }

    /* Style 1: Top Right, Success Green */
    .toast-style1 {
      top: 20px;
      right: 20px;
      background-color: #28a745;
    }
    .toast-style1::before {
      content: '✓'; /* Checkmark for success */
      color: white;
    }

    /* Style 2: Bottom Center, Error Red with Slide Up */
    .toast-style2 {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #dc3545;
      transition: transform 0.5s ease, opacity 0.5s ease;
    }
    .toast-style2.show {
      transform: translateX(-50%) translateY(-10px);
    }
    .toast-style2:not(.show) {
      transform: translateX(-50%) translateY(50px);
    }
    .toast-style2::before {
      content: '✗'; /* Cross for error */
      color: white;
    }

    /* Style 3: Top Center, Warning Yellow with Shadow */
    .toast-style3 {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ffc107;
      color: #333;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .toast-style3::before {
      content: '!'; /* Exclamation for warning */
      font-weight: bold;
      color: #333;
    }

    /* Style 4: Bottom Right, Info Blue with Border */
    .toast-style4 {
      bottom: 20px;
      right: 20px;
      background-color: #17a2b8;
      border-left: 4px solid #fff;
    }
    .toast-style4::before {
      content: 'i'; /* Info symbol */
      font-style: italic;
      color: white;
    }

    /* Style 5: Top Left, Minimal Gray with Fade */
    .toast-style5 {
      top: 20px;
      left: 20px;
      background-color: #6c757d;
      border-radius: 25px;
    }
    .toast-style5::before {
      content: '🔔'; /* Bell for notification */
      color: white;
    }
  </style>
</head>
<body>
  <button onclick="showToast('Success! Action completed.', 'style1')">Toast Style 1 (Top Right)</button>
  <button onclick="showToast('Error! Something went wrong.', 'style2')">Toast Style 2 (Bottom Center)</button>
  <button onclick="showToast('Warning! Check your input.', 'style3')">Toast Style 3 (Top Center)</button>
  <button onclick="showToast('Info: Processing your request...', 'style4')">Toast Style 4 (Bottom Right)</button>
  <button onclick="showToast('Notification: Action in progress.', 'style5')">Toast Style 5 (Top Left)</button>

  <script>
    function showToast(message, style) {
      // Remove any existing toast
      const existingToast = document.querySelector('.toast');
      if (existingToast) existingToast.remove();

      // Create new toast
      const toast = document.createElement('div');
      toast.classList.add('toast', `toast-${style}`);
      toast.textContent = message;

      // Append to body
      document.body.appendChild(toast);

      // Show toast
      setTimeout(() => toast.classList.add('show'), 100);

      // Hide and remove toast after 3 seconds
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 500); // Wait for fade-out transition
      }, 3000);
    }
  </script>
</body>
</html>
